<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Crachá — Vasconcelos Group</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏢</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Caveat:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* ── Estilos exclusivos da página (não quebram o CSS global) ── */
        .cracha-page {
            max-width: 640px;
            margin: 0 auto;
            padding: 8vh 28px 10vh;
            text-align: center;
        }

        .cracha-page h1 {
            font-family: 'Fraunces', serif;
            font-weight: 500;
            font-size: clamp(1.8rem, 5vw, 2.6rem);
            color: var(--lantern);
            margin-bottom: 0.5rem;
        }

        .cracha-page .subtitle {
            font-family: 'EB Garamond', serif;
            font-size: 1.1rem;
            color: var(--thread);
            letter-spacing: 0.15em;
            margin-bottom: 3rem;
        }

        .cracha-card {
            background: var(--dusk);
            padding: 2.5rem 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .cracha-card img {
            max-width: 180px;
            height: auto;
            display: block;
        }

        .cracha-card .info {
            width: 100%;
            text-align: left;
            font-family: 'EB Garamond', serif;
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--paper);
        }

        .cracha-card .info strong {
            color: var(--lantern);
        }

        .cracha-form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        .cracha-form label {
            text-align: left;
            font-family: 'EB Garamond', serif;
            font-size: 0.95rem;
            color: var(--thread);
            letter-spacing: 0.05em;
        }

        .cracha-form input,
        .cracha-form select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--dusk);
            border-radius: 6px;
            background: var(--night);
            color: var(--paper);
            font-family: 'EB Garamond', serif;
            font-size: 1rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .cracha-form input:focus,
        .cracha-form select:focus {
            outline: none;
            border-color: var(--lantern);
            box-shadow: 0 0 0 3px rgba(217, 184, 124, 0.2);
        }

        .cracha-form .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 1rem;
        }

        .cracha-form .btn-primary {
            background: var(--lantern);
            color: var(--night);
            border: none;
            padding: 12px 32px;
            border-radius: 6px;
            font-family: 'EB Garamond', serif;
            font-size: 1.05rem;
            cursor: pointer;
            transition: background 0.3s, transform 0.3s;
        }

        .cracha-form .btn-primary:hover {
            transform: scale(1.03);
        }

        .cracha-form .btn-secondary {
            background: transparent;
            border: 1px solid var(--dusk);
            color: var(--paper);
            padding: 12px 32px;
            border-radius: 6px;
            font-family: 'EB Garamond', serif;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .cracha-form .btn-secondary:hover {
            background: var(--dusk);
            color: var(--lantern);
            border-color: var(--lantern);
        }

        /* ── Tema claro ── */
        .theme-light .cracha-card {
            background: var(--dusk);
        }
        .theme-light .cracha-form input,
        .theme-light .cracha-form select {
            background: var(--night);
            color: var(--paper);
            border-color: var(--dusk);
        }
    </style>
</head>
<body>

    <!-- ══ SPLASH SCREEN ══ -->
    <div id="splash">
        <div class="splash-inner">
            <p class="splash-sub">Vasconcelos Group</p>
            <h1 class="splash-title">Gerador<br><em>de Crachá</em></h1>
            <div class="splash-line"></div>
        </div>
    </div>

    <div class="thread" id="thread"></div>

    <main class="cracha-page">

        <h1>Vasconcelos Group</h1>
        <p class="subtitle">Gerador de Crachá Corporativo</p>

        <!-- ══ FORMULÁRIO ══ -->
        <div class="cracha-form">
            <div>
                <label for="nome">Nome completo</label>
                <input type="text" id="nome" placeholder="Ex: Luna Carvalho" value="Luna Carvalho">
            </div>
            <div>
                <label for="departamento">Departamento</label>
                <select id="departamento">
                    <option value="Marketing">Marketing</option>
                    <option value="Design">Design</option>
                    <option value="TI">TI</option>
                    <option value="RH">RH</option>
                    <option value="Diretoria">Diretoria</option>
                </select>
            </div>
            <div>
                <label for="cargo">Cargo</label>
                <input type="text" id="cargo" placeholder="Ex: Fotógrafa" value="Fotógrafa">
            </div>
            <div>
                <label for="id_funcionario">ID do Funcionário</label>
                <input type="text" id="id_funcionario" placeholder="Ex: VG-2025-001" value="VG-2025-001">
            </div>

            <div class="actions">
                <button class="btn-primary" onclick="gerarCrachá()">Gerar Crachá</button>
                <a href="index.html" class="btn-secondary">← Voltar ao livro</a>
            </div>
        </div>

        <!-- ══ CRACHÁ GERADO ══ -->
        <div id="cracha-container" class="cracha-card" style="display: none;">
            <img src="logo.png" alt="Vasconcelos Group" onerror="this.style.display='none'">
            <div class="info">
                <p><strong>Nome:</strong> <span id="cracha-nome">—</span></p>
                <p><strong>Departamento:</strong> <span id="cracha-departamento">—</span></p>
                <p><strong>Cargo:</strong> <span id="cracha-cargo">—</span></p>
                <p><strong>ID:</strong> <span id="cracha-id">—</span></p>
            </div>
        </div>

    </main>

    <footer>Vasconcelos Group — Excelência, Estratégia, Resultados.</footer>

    <script src="script.js"></script>
    <script>
        // ══ Função exclusiva da página do gerador ══
        function gerarCrachá() {
            const nome = document.getElementById('nome').value.trim() || 'Não informado';
            const dept = document.getElementById('departamento').value;
            const cargo = document.getElementById('cargo').value.trim() || 'Não informado';
            const id = document.getElementById('id_funcionario').value.trim() || 'VG-0000';

            document.getElementById('cracha-nome').textContent = nome;
            document.getElementById('cracha-departamento').textContent = dept;
            document.getElementById('cracha-cargo').textContent = cargo;
            document.getElementById('cracha-id').textContent = id;

            const container = document.getElementById('cracha-container');
            container.style.display = 'flex';
            container.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // ══ Gerar automaticamente ao carregar ══
        document.addEventListener('DOMContentLoaded', gerarCrachá);
    </script>

</body>
  </html>
